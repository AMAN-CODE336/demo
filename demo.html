<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <!-- Fun heading to grab attention -->
        <h1 class="text-2xl font-bold text-center mb-6 text-purple-600">Epic Task Manager!</h1>

        <!-- Form for inputting tasks -->
        <form class="flex items-center mb-4">
            <input type="text" name="" id="task" class="flex-grow px-4 py-2 border rounded-l-lg focus:outline-none" placeholder="What's your next adventure?">
            <button type="submit" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-r-lg transition duration-200">Add Task</button>
        </form>

        <!-- Unordered list for displaying tasks -->
        <ul class="space-y-2">
        </ul>
    </div>

    <script>
        // Grab all the needed elements – think of them as your elite team members
        const myform = document.querySelector("form") // The task commander (form)
        const task_input = document.querySelector("#task") // The place where magical ideas (tasks) are born
        const ul = document.querySelector("ul") // The list of tasks – your kingdom of productivity!
        
        // Retrieve saved tasks from localStorage, or initialize an empty army (array)
        const task_array = JSON.parse(localStorage.getItem("tasks")) || []

        // On page load, create task elements for any previously stored tasks
        task_array.forEach(task => {
            createtask(task) // Summon your old tasks from the vault of localStorage!
        })

        // Form submission event listener: when you hit submit, new tasks are born!
        myform.addEventListener("submit", function (e) {
            e.preventDefault() // No page reload, thanks!
            
            if (task_input.value.trim() === "") {
                alert("You can't add an empty task! 😅")
                return
            }

            // Create a task object worthy of entering our task kingdom
            let task_obj = {
                id: Date.now(), // Unique task ID – because every task is special!
                name: task_input.value // The glorious name of your task
            }

            // Add this new task to our mighty task array
            task_array.push(task_obj)

            // Save it to localStorage – so your tasks are immortal!
            localStorage.setItem("tasks", JSON.stringify(task_array))

            // Clear the input field for the next great idea
            task_input.value = ""

            // Bring the new task to life and add it to the UI
            createtask(task_obj)
        })

        // Function to create task list item (li) and append it to the list (ul)
        function createtask(task) {
            let li = document.createElement("li") // Create a new task element
            li.textContent = task.name // Set the name of the task
            li.className = "bg-purple-100 border-l-4 border-purple-500 p-2 rounded-lg flex justify-between items-center"
            
            // Create a delete button for each task because not all tasks deserve immortality
            let delete_btn = document.createElement("button")
            delete_btn.textContent = "❌" // Add an icon to look fancy
            delete_btn.className = "text-purple-600 hover:text-purple-800 font-bold ml-2"
            
            // Add event listener to delete tasks upon clicking the ❌ button
            delete_btn.addEventListener("click", () => {
                li.remove() // Say goodbye to the task from the UI
                
                // Remove the task from the array and update localStorage
                const index = task_array.findIndex(t => t.id === task.id)
                task_array.splice(index, 1) // Exile the task from the array
                localStorage.setItem("tasks", JSON.stringify(task_array)) // Update storage
            })
            
            li.appendChild(delete_btn) // Attach the delete button to the task element
            ul.appendChild(li) // Append the task to the task list (ul)
        }
    </script>
</body>
</html>
